name: KatzenCommitTestCompile

on:
    push:
        branches: [master]

    workflow_dispatch:

jobs:
    job1:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - uses: actions/setup-java@v3
                with:
                    java-version: '25'
                    distribution: 'temurin'
            - uses: gradle/wrapper-validation-action@v1
            - run: ./gradlew build

    job2:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - uses: actions/setup-java@v3
                with:
                    java-version: '25'
                    distribution: 'temurin'
            - uses: gradle/wrapper-validation-action@v1
            - run: ./gradlew test --tests "catcafe.CatCafeTest"

    job3:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - uses: actions/setup-java@v3
                with:
                    java-version: '25'
                    distribution: 'temurin'
            - uses: gradle/wrapper-validation-action@v1
            - run: gradle spotlessCheck
