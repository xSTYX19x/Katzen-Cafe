name: KatzenCommitTestCompile

on:
    push:
        branches: [master]
    workflow_dispatch:

jobs:
    job1:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-java@v4
              with:
                  java-version: '25'
                  distribution: 'temurin'
            - uses: gradle/wrapper-validation-action@v3
            - run: gradle wrapper
            - run: ./gradlew build

    job2:
        needs: job1
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-java@v4
              with:
                  java-version: '25'
                  distribution: 'temurin'
            - uses: gradle/wrapper-validation-action@v3
            - run: gradle wrapper
            - run: ./gradlew test --tests "catcafe.CatCafeTest"

    job3:
        needs: job2
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-java@v4
              with:
                  java-version: '25'
                  distribution: 'temurin'
            - uses: gradle/wrapper-validation-action@v3
            - run: gradle wrapper
            - run: ./gradlew spotlessCheck
